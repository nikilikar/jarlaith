<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocabulary | Jarlaith's German</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div class="vocab-container">
            <h1 class="page-title">Essential Vocabulary 📚</h1>
            <p class="subtitle">English to German survival phrases</p>
            
            <table class="vocab-table">
                <thead>
                    <tr>
                        <th>English</th>
                        <th>German</th>
                        <th>Listen</th>
                    </tr>
                </thead>
                <tbody id="vocab-body">
                    <tr>
                        <td>Hello / Good day</td>
                        <td>Guten Tag</td>
                        <td><button class="audio-btn" onclick="speak('Guten Tag')">🔊</button></td>
                    </tr>
                    <tr>
                        <td>I am from Ireland</td>
                        <td>Ich komme aus Irland</td>
                        <td><button class="audio-btn" onclick="speak('Ich komme aus Irland')">🔊</button></td>
                    </tr>
                    <tr>
                        <td>Where is the tram?</td>
                        <td>Wo ist die Straßenbahn?</td>
                        <td><button class="audio-btn" onclick="speak('Wo ist die Straßenbahn')">🔊</button></td>
                    </tr>
                    <tr>
                        <td>Check, please!</td>
                        <td>Die Rechnung, bitte!</td>
                        <td><button class="audio-btn" onclick="speak('Die Rechnung, bitte')">🔊</button></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <footer>
        Made with ❤️ for Jarlaith's Erasmus 2026
    </footer>

    <script src="header.js"></script>
    <script src="script.js"></script>
</body>
</html>
