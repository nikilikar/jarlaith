<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocabulary | Jarlaith's German</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="dashboard-wrapper">
        <div class="page-title">
            <h1>Vocabulary Vault 📚</h1><br>
            <button onclick="startFlashcards('all')" class="btn-nav">⚡ Practice All Flashcards</button>
        </div>

        <div id="vocab-category-list" class="dashboard-grid">
            </div>

        <div id="flashcard-modal" class="modal" style="display:none;">
            <div class="flashcard-container">
                <div class="flashcard" id="current-card" onclick="flipCard()">
                    <div class="card-front" id="card-front">German Word</div>
                    <div class="card-back" id="card-back">English Translation</div>
                </div>
                <div class="controls">
                    <button onclick="prevCard()" class="btn-nav">←</button>
                    <span id="card-counter">1 / 10</span>
                    <button onclick="nextCard()" class="btn-nav">→</button>
                </div>
                <button onclick="closeFlashcards()" class="btn-nav">Close</button>
            </div>
        </div>
    </main>

    <footer>
        Made with ❤️ for Jarlaith's Erasmus 2026
    </footer>

    <script src="header.js"></script>
    <script src="script.js"></script>
</body>
</html>
