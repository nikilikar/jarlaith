<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Lessons | Jarlaith's German</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="dashboard-wrapper">
    <div class="dashboard-header">
        <h1>Your Missions 🚀</h1>
        <p>Click a mission to start your German training.</p>
    </div>

    <div class="dashboard-grid">
        <section id="dashboard-container" class="missions-list">
            </section>

        <aside class="sidebar">
            <div class="sidebar-box progress-box">
                <h3>Overall Progress</h3>
                <div class="progress-bar-container">
                    <div id="main-progress-bar" class="progress-fill"></div>
                </div>
                <p id="progress-stats">0/0 Missions Completed</p>
            </div>

            <div class="sidebar-box quiz-link-box">
                <h3>Knowledge Check</h3>
                <p>Think you've mastered the slang?</p>
                <a href="quizzes.html" class="quiz-cta">Go to Quizzes ⚡</a>
            </div>
        </aside>
    </div>
</main>

    <script src="header.js"></script>
    <script src="script.js"></script>
</body>
</html>
