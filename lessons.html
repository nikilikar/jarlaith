<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Lessons | Jarlaith's German</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div class="lesson-card">
            <div class="badge" id="lesson-topic">Topic: Introductions</div>
            
            <div class="phrase-section">
                <p class="lang-label">English</p>
                <h2 id="english-text">I would like a beer, please.</h2>
            </div>

            <div class="phrase-section german-box">
                <p class="lang-label">German</p>
                <h2 id="german-text">Ich hätte gerne ein Bier, bitte.</h2>
            </div>

            <div class="lesson-controls">
                <button class="btn-audio" onclick="speakCurrent()">🔊 Pronounce</button>
                <button class="btn-next" onclick="nextLesson()">Next Phrase →</button>
            </div>
            
            <p class="progress" id="progress-text">Lesson 1 of 3</p>
        </div>
    </main>

    <footer>
        Made with ❤️ for Jarlaith's Erasmus 2026
    </footer>

    <script src="header.js"></script>
    <script src="script.js"></script>
</body>
</html>
