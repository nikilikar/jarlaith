<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Big Quiz | Jarlaith's German</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .option-btn {
            width: 100%;
            padding: 15px;
            margin: 8px 0;
            border: 2px solid #eee;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }
        .option-btn:hover { background: #fffaf9; border-color: #fab1a0; }
        .correct { background: #55efc4 !important; border-color: #00b894 !important; color: white; }
        .wrong { background: #ff7675 !important; border-color: #d63031 !important; color: white; }
    </style>
    </head>
    <body>
    <header>
        <div class="logo">⚡ Knowledge Check</div>
        <nav><a href="lessons.html">Back to Dashboard</a></nav>
    </header>

    <main class="dashboard-grid">
    <section class="missions-list">
        <div id="quiz-display">
            </div>
    </section>

    <aside class="sidebar">
        <div class="sidebar-box xp-card">
            <h3>Your Experience</h3>
            <div class="xp-display"><span id="total-xp">0</span> <small>XP</small></div>
            <p id="rank-text">Beginner Traveler 🥨</p>
        </div>
    </aside>
</main>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const quizDisplay = document.getElementById('quiz-display');
    const completed = JSON.parse(localStorage.getItem('completedLessons')) || [];
    
    // Provjera XP-a za sidebar
    const currentXP = localStorage.getItem('userXP') || 0;
    document.getElementById('total-xp').innerText = currentXP;

    const isUnlocked = completed.length >= 3;

    if (isUnlocked) {
        quizDisplay.innerHTML = `
            <div class="mission-item quiz-unlock-special" onclick="window.location.href='play-quiz.html'">
                <div>
                    <span style="font-size: 1.2rem; display: block; font-weight: bold;">🏆 Level 1: Final Exam</span>
                    <p style="font-size: 0.8rem; color: #636e72;">Reward: 100 XP + Niki's Kiss 💋</p>
                </div>
                <div class="status-tag" style="background: #fdcb6e; color: #d35400;">START 🔥</div>
            </div>
        `;
    } else {
        quizDisplay.innerHTML = `
            <div class="mission-item completed" style="cursor: not-allowed; opacity: 0.7;">
                <div>
                    <span style="font-size: 1.2rem; display: block; font-weight: bold; color: #b2bec3;">🔒 Level 1 Quiz</span>
                    <p style="font-size: 0.8rem; color: #b2bec3;">Finish all 3 missions to unlock this.</p>
                </div>
                <div class="status-tag">LOCKED</div>
            </div>
        `;
    }
});
</script>
</body>
</html>
